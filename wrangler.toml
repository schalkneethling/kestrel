name = "kestrel"
main = "apps/worker/src/index.ts"
compatibility_date = "2026-07-08"

[[d1_databases]]
binding = "DB"
database_name = "kestrel"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "migrations"

[assets]
directory = "apps/dashboard/dist"
binding = "ASSETS"

[triggers]
crons = ["0 */3 * * *"]
